import:
  - recipe/laravel.php
  - contrib/php-fpm.php
  - contrib/npm.php
  - deploy/app.php
  - deploy/provision.php

config:
  repository:                                             # repository, e.g. 'git@github.com:dziurka/laravel-boilerplate.git'
  remote_user: 'deployer'
  base_deploy_path: '/home/deployer'
  php_fpm_version: '8.3'
  php_version: '8.3'
  db_driver: pgsql
  mailpit_enabled: false
  mailpit_port: 8025
  basic_auth_enabled: false
  supervisor_services:
    - horizon

hosts:
  production:
    hostname:                                             # production server IP e.g. '140.12.12.120'
    deploy_path: '{{base_deploy_path}}/prod.app'
    supervisor_services:
      - horizon-production
  staging:
    hostname:                                             # staging server IP e.g. '140.12.12.120'
    deploy_path: '{{base_deploy_path}}/staging.app'
    mailpit_enabled: true
    basic_auth_enabled: true
    supervisor_services:
      - horizon-staging
      - mailpit

tasks:
  deploy:
    - deploy:prepare        # setup, lock, update_code, deploy:env, shared, writable
    - deploy:vendors        # composer install
    - artisan:storage:link
    - artisan:config:cache
    - artisan:route:cache
    - artisan:view:cache
    - artisan:event:cache
    - artisan:migrate
    - npm:install           # installs node_modules (npm ci)
    - app:frontend          # npm run build
    - deploy:publish        # symlink, unlock, cleanup, success
    - php-fpm:reload
    - deploy:horizon
    - deploy:supervisor
