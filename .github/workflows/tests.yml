name: Tests

on:
  push:
    branches: ['**']
    tags-ignore: ['**']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2

      - uses: ramsey/composer-install@v3

      - name: Run tests
        run: vendor/bin/phpunit
